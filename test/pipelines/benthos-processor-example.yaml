---
version: 2.2
pipelines:
  - id: pipeline-with-benthos-processor
    status: running
    description: >
      An example pipeline that uses the Benthos processor.

      It reads data from the `example.in` file, processes it through Benthos,
      and writes the results to the `example.out` file.

      Results can be viewed with `tail -f example.out | jq '.payload.after |= @base64d'`.
    connectors:
      - id: file-source
        type: source
        plugin: "builtin:file"
        name: file-source
        settings:
          path: ./example.in
      - id: file-destination
        type: destination
        plugin: "builtin:file"
        name: file-destination
        settings:
          path: ./example.out
    processors:
      - id: benthos-processor
        plugin: "benthos"
        settings:
          benthosYAML: |
            processors:
              - mapping: |
                  # This is a Benthos Bloblang mapping that converts the payload to uppercase
                  # It takes the current message content, accesses the payload.after field,
                  # converts it to a string, uppercases it, and converts it back to bytes
                  root.payload.after = content().payload.after.string().uppercase().bytes()

                  # We can also add metadata to show it was processed by Benthos
                  root.metadata.processed_by = "benthos"
